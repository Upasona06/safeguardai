<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="92" fill="#f2efe7"/>
  
  <!-- Shield shape with gradient -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5a2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7a52;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield outline -->
  <path d="M 96 30 L 140 50 L 140 95 Q 140 140 96 160 Q 52 140 52 95 L 52 50 Z" 
        fill="url(#shieldGradient)" 
        stroke="#0f766e" 
        stroke-width="3"/>
  
  <!-- Checkmark inside shield -->
  <g transform="translate(96, 95)">
    <!-- Checkmark -->
    <path d="M -12 0 L -2 12 L 15 -8" 
          stroke="white" 
          stroke-width="5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
</svg>
